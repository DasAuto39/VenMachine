
services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
    # GPU support (uncomment if you have NVIDIA GPU):
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 300s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # Sinkronisasi folder agar fitur --reload tetap jalan saat Anda edit kode
    depends_on:
      db:
        condition: service_started
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override LLM host untuk docker network
      LLM_HOST: http://ollama:11434
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app             # Sinkronisasi kode React Anda (Live Reload)
      - /app/node_modules           # Trik ajaib agar node_modules lokal tidak bentrok dengan versi Linux Docker
    depends_on:
      - backend                     # Pastikan backend nyala dulu sebelum frontend

volumes:
  pg_data:
  ollama_data: